---
- name: Install PostgreSQL and dependencies
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
    state: present
    update_cache: yes

- name: Enable and start PostgreSQL
  systemd:
    name: postgresql
    enabled: yes
    state: started

- name: Create application database user
  become_user: postgres
  postgresql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    role_attr_flags: CREATEDB,LOGIN

- name: Create application database
  become_user: postgres
  postgresql_db:
    name: "{{ db_name }}"
    owner: "{{ db_user }}"
    state: present

- name: Grant all privileges on database to user
  become_user: postgres
  postgresql_privs:
    database: "{{ db_name }}"
    roles: "{{ db_user }}"
    privs: ALL
    type: database

- name: Allow PostgreSQL connections from web-01
  lineinfile:
    path: /etc/postgresql/{{ postgresql_version | default('16') }}/main/pg_hba.conf
    line: "host    {{ db_name }}    {{ db_user }}    10.0.1.10/32    md5"
    state: present
  notify: Restart PostgreSQL

- name: Configure PostgreSQL to listen on all interfaces
  lineinfile:
    path: /etc/postgresql/{{ postgresql_version | default('16') }}/main/postgresql.conf
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
    state: present
  notify: Restart PostgreSQL

- name: Configure UFW - allow SSH
  ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Configure UFW - allow PostgreSQL from web-01 only
  ufw:
    rule: allow
    src: '10.0.1.10'
    port: '5432'
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny

handlers:
  - name: Restart PostgreSQL
    systemd:
      name: postgresql
      state: restarted
